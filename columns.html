<div id="container">
    <div id="item1">Header</div>
    <div id="item3">Content</div>
    <div id="item2">Menu</div>
    <div id="item4">Footer</div>
</div>

<style>
* {
    border:1px solid gray;
}
#container {
    border:1px solid red;
    display:grid;
    grid-template-columns: 1fr 3fr;
    grid-template-rows: 100px 400px 100px;

    grid-template-areas:
        "header header"
        "menu   content"
        "footer footer";
}
#container div {
    padding:2em;
}
#item1 {
    grid-area:header;
}
#item2 {
    grid-area:menu;
}
#item3 {
    grid-area:content;
}
#item4 {
    grid-area:footer;
}

@media (max-width:300px) {

#container {
    grid-template-areas:
        "header  header"
        "menu    menu"
        "content content"
        "footer  footer";
    grid-template-rows: auto;
}

}

</style>
