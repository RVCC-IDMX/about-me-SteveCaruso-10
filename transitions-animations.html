<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transitions & Animations</title>
</head>
<body>

<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Transitions</a></li>
        <li><a href="#">Transforms</a></li>
        <li><a href="#">Animations</a></li>
        <li><a href="#trans-by-proxy">By Proxy</a></li>
    </ul>
</nav>

<style>
html {
    scroll-behavior: smooth;
}
h1:target {
    transition-duration:1s;
    transition-delay:1s;
    background-color:yellow;
}
nav ul {
    padding:0;
    list-style: none;
    display:flex;
    justify-content:space-between;
}
</style>
    
<h1>Transitions</h1>

<p id="transition">Here is some text.</p>

<style>
#transition {
    background-color:bisque;
    width:100px;
    height:50px;
    transition: 
        width 1s,
        background-color 1s 1s,
        border-radius 1s 2s;
    /*transition-duration: 1s;
    transition-timing-function:cubic-bezier(0.94, 0.82, 0.88, 0.07);
    transition-delay: .5s;*/
}
#transition:hover {
    width:300px;
    background-color:yellow;
    border-radius:30px;  
}
</style>

<h1>Transforms</h1>

<p id="transforms">More text Here</p>

<style>
#transforms {
    width:100px;
    height:100px;
    border:1px solid black;
    background-color:chartreuse;
    transform:rotate(0deg);
    transition: 
        all 2s,
        transform 2s,
        background-color 4s;
}
#transforms:hover {
    transform:rotate(45deg);
    background-color:red;
    border-left:10px solid black;
}
</style>

<h1>Animations</h1>

<p id="animation">Animate!</p>

<style>
#animation {
    width:100px;
    height:100px;
    border:1px solid black;
    animation-name: slide-in;
    animation-duration:3s;
    animation-delay: 0s;
    animation-fill-mode: both;
}
#animation:hover {
    animation-play-state: paused;
    background-color:red;
}
@keyframes slide-in {
  0% {
    transform: scale(25%) translateX(-200%) rotate(180deg);
  }

  50% {
    transform: scale(200%) translateX(300%);
  }

  100% {
    transform: scale(100%) translateX(0%);
  }
}
</style>


<h1 id="trans-by-proxy">Transition By Proxy</h1>

<input id="trigger" type="checkbox">

<p id="proxy">Transition thingy</p>

<label for="trigger" id="fakeButton">Button</label>

<style>
#trigger {
    display:none;
}
#proxy {
    width:100px;
    height:100px;
    border:1px solid black;
}
#trigger:checked ~ #proxy {
    animation:slide-in;
    animation-duration:2s;
}
#fakeButton {
    border:1px solid black;
    background-color:gray;
    border-radius:5px;
    padding:3px;
}
</style>

</body>
</html>
